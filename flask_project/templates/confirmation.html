<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Confirmed</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 500px;
            text-align: center;
            animation: popIn 0.5s ease-out;
        }
        
        @keyframes popIn {
            from {
                opacity: 0;
                transform: scale(0.8);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }
        
        .success-icon {
            font-size: 80px;
            margin-bottom: 20px;
            animation: bounce 1s ease infinite;
        }
        
        @keyframes bounce {
            0%,
            100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-10px);
            }
        }
        
        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }
        
        .message {
            color: #888;
            margin-bottom: 30px;
            font-size: 16px;
        }
        
        .details-card {
            background: linear-gradient(135deg, #f5f7fa 0%, #e4e8ec 100%);
            border-radius: 16px;
            padding: 25px;
            margin-bottom: 25px;
            text-align: left;
        }
        
        .detail-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #ddd;
        }
        
        .detail-row:last-child {
            border-bottom: none;
        }
        
        .detail-label {
            color: #888;
            font-size: 14px;
            font-weight: 500;
        }
        
        .detail-value {
            color: #333;
            font-size: 16px;
            font-weight: 600;
        }
        
        .detail-icon {
            margin-right: 8px;
        }
        
        .back-btn {
            display: inline-block;
            padding: 14px 40px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-decoration: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .back-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
        }
    </style>
    <base target="_blank">
</head>

<body>
    <div class="container">
        <div class="success-icon">✅</div>
        <h1>Registration Successful!</h1>
        <p class="message">Your details have been submitted successfully.</p>

        <div class="details-card">
            <div class="detail-row">
                <span class="detail-label"><span class="detail-icon">👤</span> Full Name</span>
                <span class="detail-value">{{ name }}</span>
            </div>
            <div class="detail-row">
                <span class="detail-label"><span class="detail-icon">🏙️</span> City</span>
                <span class="detail-value">{{ city }}</span>
            </div>
            <div class="detail-row">
                <span class="detail-label"><span class="detail-icon">📞</span> Phone Number</span>
                <span class="detail-value">{{ phone }}</span>
            </div>
        </div>

        <a href="/" class="back-btn">Register Another User</a>
    </div>
</body>

</html>
